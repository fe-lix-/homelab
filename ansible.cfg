[defaults]
inventory = inventories/production/hosts.yml
# Create inventories/production/ with hosts.yml and group_vars/all/{main.yml,vault.yml}
roles_path = roles
remote_user = ansible
private_key_file = ~/.ssh/homelab

[privilege_escalation]
become = true
become_method = sudo

[ssh_connection]
pipelining = true
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
