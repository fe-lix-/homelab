---
# vmail owns the dovecot sieve dir and (legacy) mail spool data. No shell
# needed — dovecot uses the uid for file ownership, not for spawning processes.
- name: Ensure vmail system user exists
  ansible.builtin.user:
    name: vmail
    state: present
    shell: /usr/sbin/nologin

- name: Deploy dovecot.conf
  ansible.builtin.template:
    src: dovecot.conf.j2
    dest: /etc/dovecot/dovecot.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify: Restart dovecot

- name: Ensure /var/lib/dovecot/sieve exists
  ansible.builtin.file:
    path: /var/lib/dovecot/sieve
    state: directory
    mode: "0755"
    owner: vmail
    group: vmail

- name: Deploy default.sieve
  ansible.builtin.copy:
    src: default.sieve
    dest: /var/lib/dovecot/sieve/default.sieve
    mode: "0644"
    owner: vmail
    group: vmail
  register: sieve_deploy
  notify: Restart dovecot

- name: Compile default.sieve
  ansible.builtin.command:
    cmd: sievec /var/lib/dovecot/sieve/default.sieve
  args:
    creates: /var/lib/dovecot/sieve/default.svbin
  when: sieve_deploy.changed  # noqa no-handler

- name: Deploy PAM dovecot config
  ansible.builtin.copy:
    src: dovecot.pam
    dest: /etc/pam.d/dovecot
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify: Restart dovecot

- name: Ensure dovecot is enabled and running
  ansible.builtin.systemd:
    name: dovecot
    enabled: true
    state: started
