---
grafana_version: "11.5.2"
loki_version: "3.7.1"
alloy_version: "v1.14.2"
prometheus_version: "v3.10.0"
node_exporter_version: "v1.10.2"
cadvisor_version: "v0.55.1"
smartctl_exporter_version: "v0.12.0"
blackbox_exporter_version: "v0.26.0"
nut_exporter_version: "3.2.5"
grafana_port: 3002
webhook_receiver_port: 9095
monitoring_data_dir: /opt/monitoring
monitoring_textfile_dir: /opt/monitoring/textfile
monitoring_network_subnet: "172.21.0.0/16"
monitoring_network_gateway: "172.21.0.1"
grafana_admin_user: "admin"
grafana_admin_password: "CHANGE_ME"
loki_retention_period: "30d"
prometheus_retention_period: "30d"
internet_probe_targets:
  - "https://www.google.com"
  - "https://cloudflare.com"
  - "https://1.1.1.1"

# Komga reading-metrics integration. Komga writes to its SQLite continuously,
# so we snapshot a consistent copy via `sqlite3 .backup` every few minutes and
# mount the snapshot read-only into Grafana via the frser-sqlite-datasource
# plugin. Avoids any locking concerns on the live DB.
komga_db_path: /opt/komga/config/database.sqlite
# Snapshot lives in its own directory because SQLite needs to write a rollback
# journal as a sibling file when Grafana opens the DB. We bind-mount the
# directory (writable) into Grafana so SQLite has somewhere to put the journal.
komga_snapshot_dir: /opt/monitoring/komga-snapshot
komga_snapshot_path: /opt/monitoring/komga-snapshot/komga.sqlite
komga_snapshot_interval: 5min
# Grafana container runs as uid 472 — the snapshot dir needs to be writable
# by that uid so SQLite can create journal files.
komga_snapshot_owner_uid: 472
komga_snapshot_owner_gid: 472
