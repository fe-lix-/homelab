---
- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ monitoring_data_dir }}"
    - "{{ monitoring_textfile_dir }}"

- name: Create Komga snapshot directory (owned by Grafana uid for journal writes)
  ansible.builtin.file:
    path: "{{ komga_snapshot_dir }}"
    state: directory
    owner: "{{ komga_snapshot_owner_uid }}"
    group: "{{ komga_snapshot_owner_gid }}"
    mode: "0755"

- name: Deploy monitoring docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ monitoring_data_dir }}/docker-compose.yml"
    mode: "0600"
  no_log: true
  notify: Restart monitoring

- name: Deploy Loki configuration
  ansible.builtin.template:
    src: loki-config.yml.j2
    dest: "{{ monitoring_data_dir }}/loki-config.yml"
    mode: "0644"
  notify: Restart monitoring

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ monitoring_data_dir }}/prometheus.yml"
    mode: "0644"
  notify: Restart monitoring

- name: Deploy Blackbox Exporter configuration
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: "{{ monitoring_data_dir }}/blackbox.yml"
    mode: "0644"
  notify: Restart monitoring

- name: Deploy Alloy configuration
  ansible.builtin.template:
    src: alloy-config.alloy.j2
    dest: "{{ monitoring_data_dir }}/alloy-config.alloy"
    mode: "0644"
  notify: Restart monitoring

- name: Deploy webhook receiver script
  ansible.builtin.template:
    src: webhook-receiver.py.j2
    dest: "{{ monitoring_data_dir }}/webhook-receiver.py"
    mode: "0644"
  notify: Restart monitoring

- name: Deploy Grafana datasource provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: "{{ monitoring_data_dir }}/datasources.yml"
    mode: "0644"
  no_log: true
  notify: Restart monitoring

- name: Deploy Grafana dashboard provider
  ansible.builtin.template:
    src: grafana-dashboard-provider.yml.j2
    dest: "{{ monitoring_data_dir }}/dashboard-provider.yml"
    mode: "0644"
  notify: Restart monitoring

- name: Create dashboards directory
  ansible.builtin.file:
    path: "{{ monitoring_data_dir }}/dashboards"
    state: directory
    mode: "0755"

- name: Deploy Grafana dashboards
  ansible.builtin.template:
    src: "dashboards/{{ item }}"
    dest: "{{ monitoring_data_dir }}/dashboards/{{ item | regex_replace('\\.j2$', '') }}"
    mode: "0644"
  loop:
    - server-overview.json.j2
    - temperatures.json.j2
    - screen-time.json.j2
    - internet-connectivity.json.j2
    - ups.json.j2
  notify: Restart monitoring

- name: Deploy static Grafana dashboards
  ansible.builtin.copy:
    src: "dashboards/{{ item }}"
    dest: "{{ monitoring_data_dir }}/dashboards/{{ item }}"
    mode: "0644"
  loop:
    - logs.json
    - komga-reading.json
  notify: Restart monitoring

- name: Ensure sqlite3 CLI is installed (for the Komga snapshot service)
  ansible.builtin.apt:
    name: sqlite3
    state: present

- name: Deploy komga-snapshot systemd service
  ansible.builtin.template:
    src: komga-snapshot.service.j2
    dest: /etc/systemd/system/komga-snapshot.service
    mode: "0644"

- name: Deploy komga-snapshot systemd timer
  ansible.builtin.template:
    src: komga-snapshot.timer.j2
    dest: /etc/systemd/system/komga-snapshot.timer
    mode: "0644"

- name: Reload systemd so the snapshot start below picks up the latest unit
  ansible.builtin.systemd:
    daemon_reload: true

- name: Take an initial Komga snapshot before starting Grafana
  # Grafana's compose mount references komga_snapshot_dir; without a snapshot
  # in place, queries against the dashboard would fail until the timer fires
  # (up to 5 minutes after deploy).
  ansible.builtin.command:
    cmd: "/bin/systemctl start komga-snapshot.service"
    creates: "{{ komga_snapshot_path }}"

- name: Enable and start komga-snapshot timer
  ansible.builtin.systemd:
    name: komga-snapshot.timer
    enabled: true
    state: started
    daemon_reload: true

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_data_dir }}"
    state: present
