---
# nginx is installed by this role (not mail-base) so that mail-certbot can run
# its --standalone bootstrap before nginx claims port 80 on a fresh install.
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: true
    cache_valid_time: 3600

# The mail vhost includes /etc/letsencrypt/options-ssl-nginx.conf and references
# /etc/letsencrypt/ssl-dhparams.pem. On boxes where the cert was obtained via
# `certbot --installer nginx`, both files are auto-placed; our --standalone
# bootstrap path doesn't trigger that. Seed them from the packaged copies so
# nginx can start before/without a certbot-managed issuance.
- name: Ensure /etc/letsencrypt exists
  ansible.builtin.file:
    path: /etc/letsencrypt
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Seed nginx SSL options from certbot-nginx package
  ansible.builtin.copy:
    src: /usr/lib/python3/dist-packages/certbot_nginx/_internal/tls_configs/options-ssl-nginx.conf
    dest: /etc/letsencrypt/options-ssl-nginx.conf
    remote_src: true
    force: false
    mode: "0644"
    owner: root
    group: root

- name: Seed ssl-dhparams.pem from certbot package
  ansible.builtin.copy:
    src: /usr/lib/python3/dist-packages/certbot/ssl-dhparams.pem
    dest: /etc/letsencrypt/ssl-dhparams.pem
    remote_src: true
    force: false
    mode: "0644"
    owner: root
    group: root

- name: Deploy mail nginx vhost
  ansible.builtin.template:
    src: mail.conf.j2
    dest: "{{ mail_nginx_vhost_path }}"
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify: Reload nginx

- name: Ensure mail vhost is enabled
  ansible.builtin.file:
    src: "{{ mail_nginx_vhost_path }}"
    dest: /etc/nginx/sites-enabled/mail
    state: link
  notify: Reload nginx

- name: Ensure nginx is enabled and running
  ansible.builtin.systemd:
    name: nginx
    enabled: true
    state: started
