---
- name: Look up radarr user
  ansible.builtin.getent:
    database: passwd
    key: "{{ radarr_user }}"

- name: Set radarr uid/gid facts
  ansible.builtin.set_fact:
    radarr_uid: "{{ ansible_facts['getent_passwd'][radarr_user][1] }}"
    radarr_gid: "{{ ansible_facts['getent_passwd'][radarr_user][2] }}"

- name: Create Radarr directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ radarr_user }}"
    mode: "0755"
  loop:
    - "{{ radarr_data_dir }}"
    - "{{ radarr_data_dir }}/config"

- name: Deploy Radarr docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ radarr_data_dir }}/docker-compose.yml"
    owner: "{{ radarr_user }}"
    mode: "0644"
  notify: Restart radarr

- name: Start Radarr
  community.docker.docker_compose_v2:
    project_src: "{{ radarr_data_dir }}"
    state: present

- name: Wait for Radarr config file
  ansible.builtin.wait_for:
    path: "{{ radarr_data_dir }}/config/config.xml"
    state: present
    timeout: 30

- name: Disable Radarr native auth (handled by Authelia)
  ansible.builtin.lineinfile:
    path: "{{ radarr_data_dir }}/config/config.xml"
    regexp: "<AuthenticationMethod>.*</AuthenticationMethod>"
    line: "  <AuthenticationMethod>External</AuthenticationMethod>"
  notify: Restart radarr
