---
- name: Create Uptime Kuma directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ uptime_kuma_data_dir }}"
    - "{{ uptime_kuma_data_dir }}/data"

- name: Deploy Uptime Kuma docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ uptime_kuma_data_dir }}/docker-compose.yml"
    mode: "0644"
  notify: Restart uptime-kuma

- name: Deploy monitor provisioning script
  ansible.builtin.template:
    src: provision-monitors.py.j2
    dest: "{{ uptime_kuma_data_dir }}/provision-monitors.py"
    mode: "0700"
  no_log: true
  when: uptime_kuma_username | length > 0

- name: Start Uptime Kuma
  community.docker.docker_compose_v2:
    project_src: "{{ uptime_kuma_data_dir }}"
    state: present

