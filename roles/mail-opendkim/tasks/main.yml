---
- name: Ensure /etc/postfix/dkim directory exists
  ansible.builtin.file:
    path: /etc/postfix/dkim
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Check whether DKIM key already exists
  ansible.builtin.stat:
    path: "/etc/postfix/dkim/{{ mail_subdomain }}.private"
  register: dkim_key

- name: Restore primary DKIM private key from vault if missing on disk
  ansible.builtin.copy:
    content: "{{ mail_dkim_private_keys[mail_domain] }}"
    dest: "/etc/postfix/dkim/{{ mail_subdomain }}.private"
    owner: root
    group: opendkim
    mode: "0640"
    force: false
  when:
    - not dkim_key.stat.exists
    - mail_domain in mail_dkim_private_keys
    - mail_dkim_private_keys[mail_domain] | length > 0
  no_log: true
  notify: Restart opendkim

- name: Generate DKIM key (only if missing — never regenerate)
  ansible.builtin.command:
    cmd: "opendkim-genkey -D /etc/postfix/dkim/ -d {{ mail_domain }} -s {{ mail_subdomain }}"
  when:
    - not dkim_key.stat.exists
    - mail_dkim_private_keys[mail_domain] | default('') | length == 0
  notify: Restart opendkim

# Split into two tasks: the .private file's perms are security-critical (DKIM
# signing breaks silently if opendkim can't read the key), so any error there
# must fail loud. The .txt file is the public DNS record (not loaded by
# opendkim) and is legitimately missing after a vault-restore — failed_when:
# false on that one only, so the loop doesn't abort on absent .txt.
- name: Set group/mode on primary DKIM .private (strict — failures must surface)
  ansible.builtin.file:
    path: "/etc/postfix/dkim/{{ mail_subdomain }}.private"
    group: opendkim
    mode: "0640"

- name: Set group/mode on primary DKIM .txt (lenient — may be absent post-vault-restore)
  ansible.builtin.file:
    path: "/etc/postfix/dkim/{{ mail_subdomain }}.txt"
    group: opendkim
    mode: "0640"
  failed_when: false

# Per-domain DKIM keys for additional virtual domains. Same never-regenerate
# guard as the primary key — opendkim-genkey only runs if the .private file
# is missing.
- name: Ensure per-extra-domain DKIM directories exist
  ansible.builtin.file:
    path: "/etc/postfix/dkim/{{ item }}"
    state: directory
    mode: "0755"
    owner: root
    group: root
  loop: "{{ mail_extra_domains }}"

- name: Check whether each extra-domain DKIM key already exists
  ansible.builtin.stat:
    path: "/etc/postfix/dkim/{{ item }}/{{ mail_subdomain }}.private"
  register: extra_dkim_keys
  loop: "{{ mail_extra_domains }}"

- name: Restore extra-domain DKIM private keys from vault if missing on disk
  ansible.builtin.copy:
    content: "{{ mail_dkim_private_keys[item.item] }}"
    dest: "/etc/postfix/dkim/{{ item.item }}/{{ mail_subdomain }}.private"
    owner: root
    group: opendkim
    mode: "0640"
    force: false
  loop: "{{ extra_dkim_keys.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - not item.stat.exists
    - item.item in mail_dkim_private_keys
    - mail_dkim_private_keys[item.item] | length > 0
  no_log: true
  notify: Restart opendkim

- name: Generate DKIM key for extra domains (only if missing)
  ansible.builtin.command:
    cmd: "opendkim-genkey -D /etc/postfix/dkim/{{ item.item }}/ -d {{ item.item }} -s {{ mail_subdomain }}"
  when:
    - not item.stat.exists
    - mail_dkim_private_keys[item.item] | default('') | length == 0
  loop: "{{ extra_dkim_keys.results }}"
  loop_control:
    label: "{{ item.item }}"
  notify: Restart opendkim

- name: Set group/mode on extra-domain DKIM .private (strict)
  ansible.builtin.file:
    path: "/etc/postfix/dkim/{{ item }}/{{ mail_subdomain }}.private"
    group: opendkim
    mode: "0640"
  loop: "{{ mail_extra_domains }}"

- name: Set group/mode on extra-domain DKIM .txt (lenient — may be absent post-vault-restore)
  ansible.builtin.file:
    path: "/etc/postfix/dkim/{{ item }}/{{ mail_subdomain }}.txt"
    group: opendkim
    mode: "0640"
  loop: "{{ mail_extra_domains }}"
  failed_when: false

- name: Deploy DKIM keytable
  ansible.builtin.template:
    src: keytable.j2
    dest: /etc/postfix/dkim/keytable
    mode: "0644"
    owner: root
    group: root
  notify: Restart opendkim

- name: Deploy DKIM signingtable
  ansible.builtin.template:
    src: signingtable.j2
    dest: /etc/postfix/dkim/signingtable
    mode: "0644"
    owner: root
    group: root
  notify: Restart opendkim

- name: Deploy DKIM trustedhosts
  ansible.builtin.copy:
    src: trustedhosts
    dest: /etc/postfix/dkim/trustedhosts
    mode: "0644"
    owner: root
    group: root
  notify: Restart opendkim

- name: Deploy /etc/opendkim.conf
  ansible.builtin.copy:
    src: opendkim.conf
    dest: /etc/opendkim.conf
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify: Restart opendkim

- name: Deploy /etc/default/opendkim
  ansible.builtin.copy:
    src: default
    dest: /etc/default/opendkim
    mode: "0644"
    owner: root
    group: root
    backup: true
  notify: Restart opendkim

- name: Ensure opendkim is enabled and running
  ansible.builtin.systemd:
    name: opendkim
    enabled: true
    state: started
