<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mithlond</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Text:ital,wght@0,400;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Crimson Text', Georgia, serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #050a10;
            color: #b8c8d8;
            overflow: hidden;
        }

        /* Sea-mist horizon glow */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 90% 50% at 50% 100%, #0a1828 0%, transparent 70%),
                radial-gradient(ellipse 60% 30% at 50% 60%, #0e1c2c 0%, transparent 60%),
                radial-gradient(ellipse 70% 20% at 50% 0%, #060c14 0%, transparent 60%);
            pointer-events: none;
        }

        /* Faint star ring */
        body::after {
            content: '✦   ✧   ✦   ✧   ✦   ✧   ✦   ✧   ✦   ✧   ✦   ✧';
            position: fixed;
            font-size: 0.7rem;
            letter-spacing: 0.55em;
            color: #1c2c3e;
            width: 460px;
            height: 460px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid #15222e;
            text-align: center;
            word-break: break-all;
            padding: 1rem;
            pointer-events: none;
        }

        .container {
            position: relative;
            text-align: center;
            padding: 3rem 2.5rem;
            max-width: 500px;
            z-index: 1;
        }

        .gate-symbol {
            font-size: 3.5rem;
            margin-bottom: 1.25rem;
            opacity: 0.55;
            filter: brightness(0.85) hue-rotate(180deg);
            display: block;
        }

        h1 {
            font-family: 'Cinzel', 'Trajan Pro', serif;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #c8d8e8;
            text-shadow: 0 0 30px rgba(140, 180, 220, 0.4), 0 0 60px rgba(140, 180, 220, 0.15);
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.3em;
            color: #6a8098;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .divider {
            width: 120px;
            height: 1px;
            background: linear-gradient(to right, transparent, #3a5070, transparent);
            margin: 0 auto 2rem;
        }

        p {
            font-size: 1.15rem;
            font-style: italic;
            color: #8aa0b8;
            line-height: 1.7;
            margin-bottom: 0.5rem;
        }

        .hint {
            font-size: 0.9rem;
            font-style: normal;
            color: #3a5070;
            margin-top: 2rem;
            letter-spacing: 0.05em;
        }

        .ornament {
            display: block;
            color: #2a4060;
            font-size: 1.1rem;
            margin: 1.5rem auto 0;
            letter-spacing: 1em;
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="gate-symbol">⚓</span>
        <h1>Mithlond</h1>
        <div class="subtitle">The Grey Havens &mdash; Bearer of Letters</div>
        <div class="divider"></div>
        <p>From this quiet harbour, ships sail west across the sea.</p>
        <p>No traveller is received here; only messages pass through.</p>
        <p class="hint">If you sought another port, look elsewhere.</p>
        <span class="ornament">✦ ✦ ✦</span>
    </div>
</body>
</html>
