---
- name: Install p7zip for archive extraction
  ansible.builtin.apt:
    name: p7zip-full
    state: present

- name: Install python3-venv
  ansible.builtin.apt:
    name: python3-venv
    state: present

- name: Create manga-downloader virtualenv
  ansible.builtin.command:
    cmd: python3 -m venv {{ manga_scheduler_data_dir }}/venv
    creates: "{{ manga_scheduler_data_dir }}/venv/bin/python"

- name: Install Python dependencies for manga-downloader
  ansible.builtin.pip:
    name:
      - playwright
    virtualenv: "{{ manga_scheduler_data_dir }}/venv"

- name: Install Playwright Chromium browser
  ansible.builtin.command:
    cmd: "{{ manga_scheduler_data_dir }}/venv/bin/playwright install --with-deps chromium"
  register: playwright_install
  changed_when: "'downloaded' in playwright_install.stdout.lower()"

- name: Create manga-scheduler data directory
  ansible.builtin.file:
    path: "{{ manga_scheduler_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Create manga-downloader staging directory
  ansible.builtin.file:
    path: "{{ manga_downloader_staging_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy manga-scheduler script
  ansible.builtin.template:
    src: manga-scheduler.py.j2
    dest: "{{ manga_scheduler_data_dir }}/manga-scheduler.py"
    owner: root
    group: root
    mode: "0700"

- name: Deploy manga-downloader script
  ansible.builtin.template:
    src: manga-downloader.py.j2
    dest: "{{ manga_scheduler_data_dir }}/manga-downloader.py"
    owner: root
    group: root
    mode: "0700"

- name: Deploy manga-scheduler systemd service
  ansible.builtin.template:
    src: manga-scheduler.service.j2
    dest: /etc/systemd/system/manga-scheduler.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy manga-scheduler systemd timer
  ansible.builtin.template:
    src: manga-scheduler.timer.j2
    dest: /etc/systemd/system/manga-scheduler.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start manga-scheduler timer
  ansible.builtin.systemd:
    name: manga-scheduler.timer
    enabled: true
    state: started

- name: Deploy manga-scheduler UI server
  ansible.builtin.template:
    src: manga-scheduler-ui.py.j2
    dest: "{{ manga_scheduler_data_dir }}/manga-scheduler-ui.py"
    owner: root
    group: root
    mode: "0700"
  notify: Restart manga-scheduler-ui

- name: Deploy manga-scheduler UI systemd service
  ansible.builtin.template:
    src: manga-scheduler-ui.service.j2
    dest: /etc/systemd/system/manga-scheduler-ui.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start manga-scheduler-ui service
  ansible.builtin.systemd:
    name: manga-scheduler-ui.service
    enabled: true
    state: started

# --- Chapter Checker ---

- name: Deploy manga chapter checker script
  ansible.builtin.template:
    src: manga-chapter-checker.py.j2
    dest: "{{ manga_scheduler_data_dir }}/manga-chapter-checker.py"
    owner: root
    group: root
    mode: "0700"

- name: Deploy manga-chapter-checker systemd service
  ansible.builtin.template:
    src: manga-chapter-checker.service.j2
    dest: /etc/systemd/system/manga-chapter-checker.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy manga-chapter-checker systemd timer
  ansible.builtin.template:
    src: manga-chapter-checker.timer.j2
    dest: /etc/systemd/system/manga-chapter-checker.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start manga-chapter-checker timer
  ansible.builtin.systemd:
    name: manga-chapter-checker.timer
    enabled: true
    state: started
  when: manga_chapter_checker_manga | length > 0
