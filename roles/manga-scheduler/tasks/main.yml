---
- name: Create manga-scheduler data directory
  ansible.builtin.file:
    path: "{{ manga_scheduler_data_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy manga-scheduler script
  ansible.builtin.template:
    src: manga-scheduler.py.j2
    dest: "{{ manga_scheduler_data_dir }}/manga-scheduler.py"
    owner: root
    group: root
    mode: "0700"

- name: Deploy manga-scheduler systemd service
  ansible.builtin.template:
    src: manga-scheduler.service.j2
    dest: /etc/systemd/system/manga-scheduler.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy manga-scheduler systemd timer
  ansible.builtin.template:
    src: manga-scheduler.timer.j2
    dest: /etc/systemd/system/manga-scheduler.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start manga-scheduler timer
  ansible.builtin.systemd:
    name: manga-scheduler.timer
    enabled: true
    state: started

- name: Deploy manga-scheduler UI server
  ansible.builtin.template:
    src: manga-scheduler-ui.py.j2
    dest: "{{ manga_scheduler_data_dir }}/manga-scheduler-ui.py"
    owner: root
    group: root
    mode: "0700"
  notify: Restart manga-scheduler-ui

- name: Deploy manga-scheduler UI systemd service
  ansible.builtin.template:
    src: manga-scheduler-ui.service.j2
    dest: /etc/systemd/system/manga-scheduler-ui.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Enable and start manga-scheduler-ui service
  ansible.builtin.systemd:
    name: manga-scheduler-ui.service
    enabled: true
    state: started
