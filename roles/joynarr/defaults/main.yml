---
joynarr_data_dir: /opt/joynarr
joynarr_state_dir: /opt/joynarr/state
joynarr_indexer_port: 5008
joynarr_downloader_port: 5009
joynarr_downloads_dir: /srv/downloads

# TVDB proxy base URL - must expose GET /shows/{tvdbid} returning show metadata
# Required for Sonarr TVDB ID → Joyn show name resolution
joynarr_tvdb_api_base_url: ""

# German IP proxy URL (socks5:// or http://) - required for Joyn authentication
# Set in vault: joynarr_sock5_proxy_url
joynarr_sock5_proxy_url: ""
joynarr_user: svc-arr

# Self-hosted pywidevine RemoteCDM (replaces public cdrm-project.com).
# Requires a Widevine .wvd device file at {{ joynarr_cdm_dir }}/{{ joynarr_pywidevine_device }}.wvd
# (sourced out-of-band — extract from your own Android device or similar).
# Set in vault: joynarr_pywidevine_secret
joynarr_cdm_dir: /opt/joynarr/cdm
joynarr_pywidevine_device: device
joynarr_pywidevine_secret: ""
