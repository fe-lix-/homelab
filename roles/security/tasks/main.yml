---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default deny incoming
  community.general.ufw:
    direction: incoming
    default: deny

- name: Set UFW default allow outgoing
  community.general.ufw:
    direction: outgoing
    default: allow

- name: Allow SSH through UFW
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port }}"
    proto: tcp

- name: Allow Minecraft through UFW (LAN only)
  community.general.ufw:
    rule: allow
    port: "{{ minecraft_port }}"
    proto: tcp
    src: 10.0.0.0/8

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Harden SSH configuration
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: "sshd -t -f %s"
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
  notify: Restart sshd

- name: Remove fail2ban
  ansible.builtin.apt:
    name: fail2ban
    state: absent
