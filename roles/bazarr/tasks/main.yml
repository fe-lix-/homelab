---
- name: Look up bazarr user
  ansible.builtin.getent:
    database: passwd
    key: "{{ bazarr_user }}"

- name: Set bazarr uid/gid facts
  ansible.builtin.set_fact:
    bazarr_uid: "{{ ansible_facts['getent_passwd'][bazarr_user][1] }}"
    bazarr_gid: "{{ ansible_facts['getent_passwd'][bazarr_user][2] }}"

- name: Create Bazarr directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ bazarr_user }}"
    mode: "0755"
  loop:
    - "{{ bazarr_data_dir }}"
    - "{{ bazarr_data_dir }}/config"

- name: Deploy Bazarr docker-compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ bazarr_data_dir }}/docker-compose.yml"
    owner: "{{ bazarr_user }}"
    mode: "0644"
  notify: Restart bazarr

- name: Start Bazarr
  community.docker.docker_compose_v2:
    project_src: "{{ bazarr_data_dir }}"
    state: present
