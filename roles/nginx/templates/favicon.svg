<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#ffdd55"/>
      <stop offset="50%"  stop-color="#ff8800"/>
      <stop offset="100%" stop-color="#aa3300"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Forge-black background -->
  <rect width="32" height="32" rx="4" fill="#0f0500"/>
  <!-- Eight-pointed dwarven star of Khazad-dûm -->
  <polygon
    points="16,3 19,9 25,7 23,13 29,16 23,19 25,25 19,23 16,29 13,23 7,25 9,19 3,16 9,13 7,7 13,9"
    fill="url(#g)"
    filter="url(#glow)"
  />
  <!-- Central gem highlight -->
  <circle cx="16" cy="16" r="3" fill="#fff5cc" opacity="0.5"/>
</svg>
