<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f0f1a;
            color: #e0e0e0;
        }
        div { text-align: center; padding: 2.5rem; max-width: 480px; }
        .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.7; }
        h1 { font-size: 1.75rem; margin-bottom: 0.75rem; color: #ff6b6b; }
        p { color: #999; line-height: 1.6; margin-bottom: 0.5rem; }
        a { color: #7c8aff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .code { font-size: 0.85rem; color: #555; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div>
        <div class="icon">&#128274;</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to access this service.</p>
        <p>If you think this is a mistake, contact the admin.</p>
        <p class="code">HTTP 403</p>
    </div>
</body>
</html>
