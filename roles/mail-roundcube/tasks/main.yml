---
# Install Roundcube via apt + PHP-FPM. Roundcube's debconf wants to ask about
# the DB type and which web servers to auto-configure; we preseed before
# install so apt runs non-interactively, picks SQLite, and leaves nginx for
# the mail-nginx role to handle.

- name: Validate mail_roundcube_des_key is set in vault
  ansible.builtin.assert:
    that:
      - mail_roundcube_des_key | length == 24
    fail_msg: |
      mail_roundcube_des_key must be a 24-char hex string in vault.yml.
      Generate one with: python3 -c "import secrets; print(secrets.token_hex(12))"

- name: Preseed Roundcube debconf (SQLite, no web-server auto-config)
  ansible.builtin.debconf:
    name: roundcube-core
    question: "{{ item.question }}"
    vtype: "{{ item.vtype }}"
    value: "{{ item.value }}"
  loop:
    - { question: "roundcube/dbconfig-install", vtype: "boolean", value: "true" }
    - { question: "roundcube/database-type", vtype: "select", value: "sqlite3" }
    - { question: "roundcube-core/reconfigure-webserver", vtype: "multiselect", value: "" }

- name: Install Roundcube + PHP-FPM
  ansible.builtin.apt:
    name: "{{ mail_roundcube_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600
    install_recommends: false   # roundcube-core recommends apache2; we use nginx

# Defense in depth: ensure the apache2 server binary stays gone even if a
# transitive dep pulls it in. apache2 binds 0.0.0.0:80 which collides with
# nginx (and with certbot --standalone bootstrap).
#
# IMPORTANT — purge `apache2` only, NOT `apache2-bin`:
# roundcube-core depends on `libapache2-mod-php | php-fpm` and apt's
# resolver picks the first alternative, dragging in libapache2-mod-php →
# apache2-bin. Purging apache2-bin cascades to remove roundcube-core
# itself (silently breaking webmail). The mod-php is harmless because the
# apache2 daemon — which would load it — isn't installed.
#
# `autoremove` is OFF for the same reason: a true autoremove sweep yanks
# roundcube-core when apache2 disappears, since apt considers roundcube-core
# auto-installed and the apache reverse-dep is gone.
- name: Ensure apache2 server binary is purged
  ansible.builtin.apt:
    name: apache2
    state: absent
    purge: true

- name: Deploy Roundcube config (subpath + IMAP target)
  ansible.builtin.template:
    src: config.inc.php.j2
    dest: /etc/roundcube/config.inc.php
    mode: "0640"
    owner: root
    group: www-data
    backup: true
  notify: Restart php-fpm

- name: Ensure php-fpm is enabled and running
  ansible.builtin.systemd:
    name: "{{ mail_roundcube_php_fpm_service }}"
    enabled: true
    state: started
  when: not ansible_check_mode   # service won't exist on first --check
